# AutoVisio Studio — Netlify Configuration

[build]
  command   = "npx expo export --platform web"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html (Expo Router handles them)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=()"

# Cache static assets aggressively
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"